name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25.x", "1.26.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go test -short ./...

  # Retrieval-quality non-regression: the lexical golden set (SciFact gold-aware
  # subsample, no LLM/embeddings service needed). Fails the build when nDCG@10
  # drops below the configured floor (see eval-golden in the Makefile).
  golden:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - uses: actions/cache@v4
        with:
          path: .eval-data/scifact
          key: beir-scifact
      - run: make eval-golden

  # Container-backed integration tests (docker + model pull): manual trigger only.
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: AMOXTLI_TEST_OLLAMA=1 go test ./index/sqlitevec/ -timeout 20m
      - run: AMOXTLI_TEST_POSTGRES=1 AMOXTLI_TEST_OLLAMA=1 go test ./index/postgres/ -timeout 20m
      - run: AMOXTLI_TEST_POSTGRES=1 go test ./ingest/gorm/ -timeout 10m
