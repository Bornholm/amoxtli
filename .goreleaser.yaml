version: 2

before:
  hooks:
    - go mod tidy
    # Genere les scripts de completion shell empaquetes plus bas (nfpms).
    # La completion ne depend pas des grammar tags, un `go run` suffit.
    - mkdir -p completions
    - sh -c "go run ./cmd/amoxtli completion bash > completions/amoxtli.bash"
    - sh -c "go run ./cmd/amoxtli completion zsh > completions/amoxtli.zsh"
    - sh -c "go run ./cmd/amoxtli completion fish > completions/amoxtli.fish"

builds:
  - id: amoxtli
    # sqlite runs as WASM (ncruces/go-sqlite3) and tree-sitter is pure Go
    # (odvcencio/gotreesitter), so no cgo toolchains are needed and
    # cross-compilation to every first-class target just works.
    env:
      - CGO_ENABLED=0
    targets: [go_first_class]
    mod_timestamp: "{{ .CommitTimestamp }}"
    dir: ./cmd/amoxtli
    binary: amoxtli
    # Embed only the tree-sitter grammars amoxtli routes (see
    # sourcecode.DefaultRegistry); without these tags the gotreesitter
    # registry embeds all ~206 grammars (~23MB extra in the binary).
    tags:
      - grammar_subset
      - grammar_subset_go
      - grammar_subset_javascript
      - grammar_subset_typescript
      - grammar_subset_tsx
      - grammar_subset_python
      - grammar_subset_php
    flags:
      - -trimpath
    ldflags:
      - -w -s -X 'github.com/bornholm/amoxtli/internal/build.Version={{ .Version }}' -X 'github.com/bornholm/amoxtli/internal/build.LongVersion={{ .Version }} ({{ .Commit }})'

archives:
  - id: amoxtli
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - docs/cli.md

nfpms:
  - id: amoxtli
    package_name: amoxtli
    # deb -> Debian/Ubuntu, archlinux -> paquet .pkg.tar.zst installable
    # avec pacman (Arch/Manjaro). nfpm construit les deux depuis la meme
    # source, aucun toolchain natif requis (CGO_ENABLED=0).
    formats:
      - deb
      - archlinux
    vendor: bornholm
    homepage: https://github.com/bornholm/amoxtli
    maintainer: William Petit <will.arcanadelirium@gmail.com>
    description: Amoxtli - indexation et recherche de documents et de code source.
    license: MIT
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/amoxtli/LICENSE
      - src: README.md
        dst: /usr/share/doc/amoxtli/README.md
      - src: docs/cli.md
        dst: /usr/share/doc/amoxtli/cli.md
      # Completions chargees automatiquement par bash/zsh/fish a
      # l'installation du paquet (chemins standards Debian et Arch).
      - src: completions/amoxtli.bash
        dst: /usr/share/bash-completion/completions/amoxtli
        file_info: { mode: 0644 }
      - src: completions/amoxtli.zsh
        dst: /usr/share/zsh/site-functions/_amoxtli
        file_info: { mode: 0644 }
      - src: completions/amoxtli.fish
        dst: /usr/share/fish/vendor_completions.d/amoxtli.fish
        file_info: { mode: 0644 }

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  name_template: "v{{ .Version }}"
